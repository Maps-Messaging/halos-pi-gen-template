---
NetworkManager:
    global:

      # ---------------------------------------------------------------------------------------------------------
      # tcp layer configuration
      # ---------------------------------------------------------------------------------------------------------
      receiveBufferSize: 128000
      sendBufferSize: 128000
      timeout: 60000
      backlog: 100
      soLingerDelaySec: 10
      readDelayOnFragmentation: 100
      fragmentationLimit: 5
      enableReadDelayOnFragmentation: true

      # ---------------------------------------------------------------------------------------------------------
      # Generic protocol configuration
      # ---------------------------------------------------------------------------------------------------------
      serverReadBufferSize: 100K
      serverWriteBufferSize: 100K
      selectorThreadCount: 10

      # ---------------------------------------------------------------------------------------------------------
      # MQTT Protocol configuration
      # ---------------------------------------------------------------------------------------------------------
      maximumSessionExpiry: 86400
      maximumBufferSize: 10M
      serverReceiveMaximum: 10
      clientReceiveMaximum: 65535
      clientMaximumTopicAlias: 32767
      serverMaximumTopicAlias: 0
      strictClientId: false

      # ---------------------------------------------------------------------------------------------------------
      # MQTT 5.0 specific
      # ---------------------------------------------------------------------------------------------------------
      minServerKeepAlive: 0
      maxServerKeepAlive: 60

      # ---------------------------------------------------------------------------------------------------------
      # LoRa Gateway specific
      # ---------------------------------------------------------------------------------------------------------
      # Maximum Packets per second limit to ensure the radio isn't flooded
      LoRaMaxTransmissionRate: 20

      # ---------------------------------------------------------------------------------------------------------
      # MQTT-SN specific configuration
      # ---------------------------------------------------------------------------------------------------------
      maxInFlightEvents: 1
      dropQoS0Events: true
      eventQueueTimeout: 0
      advertiseGateway: false
      enablePortChanges: true
      enableAddressChanges: true
      packetReuseTimeout: 1000

      # ---------------------------------------------------------------------------------------------------------
      # Global configuration
      # ---------------------------------------------------------------------------------------------------------
      discoverable: true             # If the server registers a mdns entry for the adapter
      preferIPv6Addresses: true      # If the server should prefer IPv6 addresses over IPv4 addresses
      scanNetworkChanges: true      # If true, the server will scan for new interfaces or disconnected interfaces
      scanInterval: 60000            # Time in milliseconds to scan for network changes

        # ---------------------------------------------------------------------------------------------------------
        # Global configuration for SSL
        # ---------------------------------------------------------------------------------------------------------
      security:
        tls:
          clientCertificateRequired: false
          clientCertificateWanted: false
            #-----------------------------------
            # CRL Specific
            # crlUrl: <URL TO CRL>
            # crlInterval: <time in seconds to reload CRL>
            #-----------------------------------

          keyStore:
            type: JKS
            managerFactory: SunX509
            path: my-keystore.jks
            passphrase: password

          trustStore:
            type: JKS
            path: my-truststore.jks
            passphrase: password
            managerFactory: SunX509

        dtls:
          clientCertificateRequired: false

          keyStore:
            type: JKS
            managerFactory: SunX509
            path: my-keystore.jks
            passphrase: password

          trustStore:
            type: JKS
            path: my-truststore.jks
            passphrase: password
            managerFactory: SunX509

    data:


      - name: "MQTT Interface"
        url: tcp://0.0.0.0:1883/
        protocol: mqtt
        auth: default

      - name: "Mavlink Interface"
        url: udp://0.0.0.0:14440/
        protocol: mavlink
        auth: usernamePassword
        rejectedFrameNamespace: "/mavlink/dlq/{systemName}/{messageName}"
        topicNameTemplate: "/mavlink/{systemName}/{messageName}"
        statusTopicNameTemplate: "/mavlink/{systemName}/status"
        selectorThreadCount: "{processors}/2"
        knownSources:
          - name: "ground_control"
            vehicleClass: GCS
            description: "Ground control station"
            systemId: 255
            componentId: 190
            acceptedMessageIds: "0"
          - name: "uav_1"
            description: "UAV Quadrotor 1 — NW Narva forest patrol"
            vehicleClass: UAV
            systemId: 1
            componentId: 1
          - name: "uav_1_private_50"
            vehicleClass: UAV
            description: "UAV Quadrotor 1 private MAVLink component 50"
            systemId: 1
            componentId: 50
          - name: "uav_1_private_51"
            vehicleClass: UAV
            description: "UAV Quadrotor 1 private MAVLink component 51"
            systemId: 1
            componentId: 51
          - name: "uav_1_private_52"
            vehicleClass: UAV
            description: "UAV Quadrotor 1 private MAVLink component 52"
            systemId: 1
            componentId: 52
          - name: "uav_1_private_53"
            vehicleClass: UAV
            description: "UAV Quadrotor 1 private MAVLink component 53"
            systemId: 1
            componentId: 53
          - name: "uav_1_aux_115"
            vehicleClass: UAV
            description: "UAV Quadrotor 1 auxiliary MAVLink component 115"
            systemId: 1
            componentId: 115
          - name: "uav_1_companion"
