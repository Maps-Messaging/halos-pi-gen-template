---
SchemaManager:
  parseMode: "STRICT"   #IGNORE or STRICT
  type: "file" # Simple, File, Maps are allowed
  config:
    directoryPath: "{{MAPS_DATA}}/schemas"

  protocPath: "D:/protobuf/bin/protoc.exe"
  importLocations:
    - path: "/opt/schema/aep105/mibw/proto"
      format: "protobuf"
      name: "catl_mibw"

    - path: "/opt/schema/aep105/hibw/json_consolidated/aep105_hibw.json"
      format: "json"
      name: "catl_hibw"
